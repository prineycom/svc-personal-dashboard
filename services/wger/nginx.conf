server {
    listen 80;

    # Re-resolve the backend via Docker's embedded DNS (127.0.0.11) at request
    # time. With a static `upstream`/server name nginx caches the IP at startup,
    # so a redeploy that gives wger-web a new IP leaves nginx stuck on a stale
    # address (502 "No route to host") until nginx is restarted. Using a
    # variable in proxy_pass forces runtime resolution and avoids that.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location / {
        set $wger_upstream http://wger-web:8000;
        proxy_pass $wger_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_redirect off;
        proxy_http_version 1.1;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /static/ {
        alias /wger/static/;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Vary "Accept-Encoding" always;
    }

    location /media/ {
        alias /wger/media/;
    }

    client_max_body_size 100M;
}
