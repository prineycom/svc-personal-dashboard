# ─────────────────────────────────────────────────────────────────────────────
# Shared infrastructure — PostgreSQL 17 + Redis.
#
# PostgreSQL hosts 4 databases: vikunja_db, firefly_db, wger_db, opentickly_db.
# Redis is used by Wger (celery) and optionally other services.
#
# Conventions:
#   • PostgreSQL: internal network only — no ports: unless DB_PUBLIC_PORT is set.
#   • Redis: internal network only.
#   • Pin image tags (postgres:17-alpine, redis:7-alpine).
#   • Nothing machine-specific — all values from ${VAR} set in Dokploy.
#   • Memory limits — Pi 5 has no swap.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Shared PostgreSQL 17 ──────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine  # v17 is current stable; compatible with all services
    restart: unless-stopped

    # Container port — used by other services on the internal network.
    expose:
      - "5432"

    # Raw TCP exception: publish only if DB_PUBLIC_PORT is set.
    # Requires strong password + fail2ban on host. Leave empty to keep private.
    ports:
      - ${DB_PUBLIC_PORT:-}:5432

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Databases are created at runtime — each service's app creates its own DB.
      # POSTGRES_MULTIPLE_DATABASES: vikunja_db,firefly_db,wger_db,opentickly_db

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

    deploy:
      resources:
        limits:
          memory: 256M

    networks:
      - internal

  # ── Shared Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped

    expose:
      - "6379"

    command: redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    deploy:
      resources:
        limits:
          memory: 64M

    networks:
      - internal

volumes:
  postgres_data:
  redis_data:

networks:
  internal:
    name: ${COMPOSE_PROJECT_NAME:-pd}-internal
    internal: true
