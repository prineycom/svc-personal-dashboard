# ─────────────────────────────────────────────────────────────────────────────
# Personal Dashboard — monorepo deployment blueprint.
# Deployed from git via Dokploy.
#
# Architecture:
#   - Flat compose (no `include`) — all services in one file.
#   - Shared PostgreSQL 17 + Redis live here.
#   - Service configs live in services/<name>/.env.example for readability,
#     but compose is one flat file — no fragments.
#   - BeaverHabits + Linkding use embedded SQLite — no external DB.
#
# Conventions (from template-service):
#   • HTTP via Traefik ONLY — no `ports:` on web services.
#   • Raw TCP (PostgreSQL) is the one allowed ports: exception.
#   • Pin image tags — never `:latest`.
#   • Nothing machine-specific in git — domains/secrets from Dokploy env.
#   • Networks: web services on dokploy-network, private deps on internal.
#   • Memory limits on every service — no swap on Pi 5.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Shared PostgreSQL 17 ──────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine  # v17 is current stable; compatible with all services
    restart: unless-stopped

    # Container port — used by other services on the internal network.
    expose:
      - "5432"

    # Raw TCP exception: publish only if DB_PUBLIC_PORT is set.
    # Requires strong password + fail2ban on host. Leave empty to keep private.
    ports:
      - ${DB_PUBLIC_PORT:-}:5432

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme-postgres}
      # Databases are created at runtime — each service's app creates its own DB.

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./services/infra/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

    deploy:
      resources:
        limits:
          memory: 256M

    networks:
      - internal

  # ── Shared Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped

    expose:
      - "6379"

    command: redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    deploy:
      resources:
        limits:
          memory: 64M

    networks:
      - internal

  # ── Vikunja (Tasks) ───────────────────────────────────────────────────
  vikunja:
    image: vikunja/vikunja:2.3.0
    user: "0:0"  # rootless Docker Pi 5: run as root inside container (safe)
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      VIKUNJA_DATABASE_TYPE: ${VIKUNJA_DATABASE_TYPE:-postgres}
      VIKUNJA_DATABASE_HOST: ${VIKUNJA_DATABASE_HOST:-postgres}
      VIKUNJA_DATABASE_USER: ${VIKUNJA_DATABASE_USER:-postgres}
      VIKUNJA_DATABASE_PASSWORD: ${VIKUNJA_DATABASE_PASSWORD:-${POSTGRES_PASSWORD}}
      VIKUNJA_DATABASE_DATABASE: ${VIKUNJA_DATABASE_DATABASE:-vikunja}
      VIKUNJA_SERVICE_SECRET: ${VIKUNJA_SERVICE_SECRET:-changeme-vikunja-secret}
      VIKUNJA_SERVICE_PUBLICURL: ${VIKUNJA_SERVICE_PUBLICURL:-http://tasks.priney.com}

    volumes:
      - vikunja_files:/app/vikunja/files

    # For local testing — set VIKUNJA_PORT=3456 in .env
    # On Dokploy: leave empty and use Traefik labels instead.
    ports:
      - ${VIKUNJA_PORT:-}:3456

    # Vikunja minimal image has no wget/curl/sh — use pgrep or skip healthcheck.
    # Container verified via external curl http://localhost:3456.
    healthcheck:
      test: ["CMD", "/app/vikunja/vikunja", "doctor"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

    deploy:
      resources:
        limits:
          memory: 128M

    networks:
      - internal
      - dokploy-network

    # Traefik routing for the domain (HTTP only — the domain points at a
    # Tailscale 100.x IP, so Let's Encrypt HTTP-01 can't validate it).
    labels:
      - traefik.enable=true
      - traefik.http.routers.vikunja-web.rule=Host(`tasks.priney.com`)
      - traefik.http.routers.vikunja-web.entrypoints=web
      - traefik.http.services.vikunja-web.loadbalancer.server.port=3456
      - traefik.docker.network=dokploy-network

  # ── Firefly III (Finances) ─────────────────────────────────────────────
  firefly-app:
    image: fireflyiii/core:version-6.6.3
    hostname: firefly-app
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      APP_ENV: ${FIREFLY_APP_ENV:-production}
      APP_DEBUG: ${FIREFLY_APP_DEBUG:-false}
      SITE_OWNER: ${FIREFLY_SITE_OWNER:-admin@localhost}
      APP_KEY: ${FIREFLY_APP_KEY:-base64:changeme-firefly-app-key-must-be-32chars}
      DEFAULT_LANGUAGE: ${FIREFLY_DEFAULT_LANGUAGE:-ru_RU}
      DEFAULT_LOCALE: ${FIREFLY_DEFAULT_LOCALE:-ru_RU}
      TZ: ${FIREFLY_TZ:-Europe/Moscow}
      TRUSTED_PROXIES: "**"
      APP_URL: ${FIREFLY_APP_URL:-http://finance.priney.com}
      LOG_CHANNEL: ${FIREFLY_LOG_CHANNEL:-stack}
      APP_LOG_LEVEL: ${FIREFLY_APP_LOG_LEVEL:-notice}
      DB_CONNECTION: ${FIREFLY_DB_CONNECTION:-pgsql}
      DB_HOST: ${FIREFLY_DB_HOST:-postgres}
      DB_PORT: ${FIREFLY_DB_PORT:-5432}
      DB_DATABASE: ${FIREFLY_DB_DATABASE:-firefly}
      DB_USERNAME: ${FIREFLY_DB_USERNAME:-postgres}
      DB_PASSWORD: ${FIREFLY_DB_PASSWORD:-${POSTGRES_PASSWORD}}

    volumes:
      - firefly_uploads:/var/www/html/storage/upload

    # For local testing — set FIREFLY_PORT=8080 in .env
    ports:
      - ${FIREFLY_PORT:-}:8080

    deploy:
      resources:
        limits:
          memory: 256M

    networks:
      - internal
      - dokploy-network

    labels:
      - traefik.enable=true
      - traefik.http.routers.firefly-web.rule=Host(`finance.priney.com`)
      - traefik.http.routers.firefly-web.entrypoints=web
      - traefik.http.services.firefly-web.loadbalancer.server.port=8080
      - traefik.docker.network=dokploy-network

  firefly-cron:
    image: alpine:3.21
    restart: unless-stopped

    depends_on:
      - firefly-app

    environment:
      TZ: ${FIREFLY_TZ:-Europe/Moscow}
      STATIC_CRON_TOKEN: ${FIREFLY_STATIC_CRON_TOKEN:-changeme-cron-token}

    command: >
      sh -c "
      ln -sf /usr/share/zoneinfo/Europe/Moscow /etc/localtime;
      echo '0 3 * * * wget -qO- http://firefly-app:8080/api/v1/cron/$$STATIC_CRON_TOKEN;echo' | crontab -;
      crond -f -L /dev/stdout
      "

    deploy:
      resources:
        limits:
          memory: 32M

    networks:
      - internal

  # ── Wger (Health/Fitness) ──────────────────────────────────────────────
  wger-web:
    image: wger/server:2.5
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    environment:
      SECRET_KEY: ${WGER_SECRET_KEY:-changeme-secret-key-change-me}
      SIGNING_KEY: ${WGER_SIGNING_KEY:-changeme-signing-key-change-me}
      TIME_ZONE: ${WGER_TIME_ZONE:-Europe/Moscow}
      TZ: ${WGER_TZ:-Europe/Moscow}
      WGER_INSTANCE: ${WGER_INSTANCE:-https://wger.de}
      CSRF_TRUSTED_ORIGINS: ${WGER_CSRF_TRUSTED_ORIGINS:-http://fitness.priney.com}
      ALLOW_REGISTRATION: ${WGER_ALLOW_REGISTRATION:-True}
      ALLOW_GUEST_USERS: ${WGER_ALLOW_GUEST_USERS:-False}
      ALLOW_UPLOAD_VIDEOS: ${WGER_ALLOW_UPLOAD_VIDEOS:-True}
      MIN_ACCOUNT_AGE_TO_TRUST: ${WGER_MIN_ACCOUNT_AGE_TO_TRUST:-21}
      SYNC_EXERCISES_CELERY: ${WGER_SYNC_EXERCISES_CELERY:-True}
      SYNC_EXERCISE_IMAGES_CELERY: ${WGER_SYNC_EXERCISE_IMAGES_CELERY:-True}
      SYNC_EXERCISE_VIDEOS_CELERY: ${WGER_SYNC_EXERCISE_VIDEOS_CELERY:-True}
      SYNC_INGREDIENTS_CELERY: ${WGER_SYNC_INGREDIENTS_CELERY:-True}
      SYNC_INGREDIENTS_DUMP_URL: ${WGER_SYNC_INGREDIENTS_DUMP_URL:-https://wger.de/media/ingredients/ingredients.jsonl.gz}
      DOWNLOAD_INGREDIENTS_FROM: ${WGER_DOWNLOAD_INGREDIENTS_FROM:-WGER}
      CACHE_API_EXERCISES_CELERY: ${WGER_CACHE_API_EXERCISES_CELERY:-True}
      CACHE_API_EXERCISES_CELERY_FORCE_UPDATE: ${WGER_CACHE_API_EXERCISES_CELERY_FORCE_UPDATE:-True}
      USE_CELERY: ${WGER_USE_CELERY:-True}
      CELERY_BROKER: ${WGER_CELERY_BROKER:-redis://redis:6379/2}
      CELERY_BACKEND: ${WGER_CELERY_BACKEND:-redis://redis:6379/2}
      CELERY_FLOWER_PASSWORD: ${WGER_CELERY_FLOWER_PASSWORD:-flowerpass}
      DJANGO_DB_ENGINE: ${WGER_DJANGO_DB_ENGINE:-django.db.backends.postgresql}
      DJANGO_DB_DATABASE: ${WGER_DJANGO_DB_DATABASE:-wger}
      DJANGO_DB_USER: ${WGER_DJANGO_DB_USER:-postgres}
      DJANGO_DB_PASSWORD: ${WGER_DJANGO_DB_PASSWORD:-${POSTGRES_PASSWORD}}
      DJANGO_DB_HOST: ${WGER_DJANGO_DB_HOST:-postgres}
      DJANGO_DB_PORT: ${WGER_DJANGO_DB_PORT:-5432}
      DJANGO_PERFORM_MIGRATIONS: ${WGER_DJANGO_PERFORM_MIGRATIONS:-True}
      DJANGO_CACHE_BACKEND: ${WGER_DJANGO_CACHE_BACKEND:-django_redis.cache.RedisCache}
      DJANGO_CACHE_LOCATION: ${WGER_DJANGO_CACHE_LOCATION:-redis://redis:6379/1}
      DJANGO_CACHE_CLIENT_CLASS: ${WGER_DJANGO_CACHE_CLIENT_CLASS:-django_redis.client.DefaultClient}
      DJANGO_CACHE_TIMEOUT: ${WGER_DJANGO_CACHE_TIMEOUT:-12960}

    volumes:
      - wger_static:/home/wger/static
      - wger_media:/home/wger/media

    expose:
      - "8000"

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000"]
      interval: 10s
      timeout: 5s
      start_period: 120s
      retries: 5

    deploy:
      resources:
        limits:
          memory: 256M

    networks:
      - internal
      - dokploy-network

  wger-nginx:
    image: nginx:stable
    restart: unless-stopped

    depends_on:
      wger-web:
        condition: service_healthy

    volumes:
      - ./services/wger/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - wger_static:/wger/static:ro
      - wger_media:/wger/media:ro

    # For local testing — set WGER_PORT=8001 in .env
    ports:
      - ${WGER_PORT:-}:80

    healthcheck:
      test: ["CMD", "service", "nginx", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

    deploy:
      resources:
        limits:
          memory: 64M

    networks:
      - internal
      - dokploy-network

    labels:
      - traefik.enable=true
      - traefik.http.routers.wger-web.rule=Host(`fitness.priney.com`)
      - traefik.http.routers.wger-web.entrypoints=web
      - traefik.http.services.wger-web.loadbalancer.server.port=80
      - traefik.docker.network=dokploy-network

  wger-celery-worker:
    image: wger/server:2.5
    command: /start-worker
    restart: unless-stopped

    environment:
      SECRET_KEY: ${WGER_SECRET_KEY:-changeme-secret-key-change-me}
      SIGNING_KEY: ${WGER_SIGNING_KEY:-changeme-signing-key-change-me}
      TIME_ZONE: ${WGER_TIME_ZONE:-Europe/Moscow}
      TZ: ${WGER_TZ:-Europe/Moscow}
      WGER_INSTANCE: ${WGER_INSTANCE:-https://wger.de}
      ALLOW_REGISTRATION: ${WGER_ALLOW_REGISTRATION:-True}
      ALLOW_GUEST_USERS: ${WGER_ALLOW_GUEST_USERS:-False}
      ALLOW_UPLOAD_VIDEOS: ${WGER_ALLOW_UPLOAD_VIDEOS:-True}
      MIN_ACCOUNT_AGE_TO_TRUST: ${WGER_MIN_ACCOUNT_AGE_TO_TRUST:-21}
      SYNC_EXERCISES_CELERY: ${WGER_SYNC_EXERCISES_CELERY:-True}
      SYNC_EXERCISE_IMAGES_CELERY: ${WGER_SYNC_EXERCISE_IMAGES_CELERY:-True}
      SYNC_EXERCISE_VIDEOS_CELERY: ${WGER_SYNC_EXERCISE_VIDEOS_CELERY:-True}
      SYNC_INGREDIENTS_CELERY: ${WGER_SYNC_INGREDIENTS_CELERY:-True}
      SYNC_INGREDIENTS_DUMP_URL: ${WGER_SYNC_INGREDIENTS_DUMP_URL:-https://wger.de/media/ingredients/ingredients.jsonl.gz}
      DOWNLOAD_INGREDIENTS_FROM: ${WGER_DOWNLOAD_INGREDIENTS_FROM:-WGER}
      CACHE_API_EXERCISES_CELERY: ${WGER_CACHE_API_EXERCISES_CELERY:-True}
      CACHE_API_EXERCISES_CELERY_FORCE_UPDATE: ${WGER_CACHE_API_EXERCISES_CELERY_FORCE_UPDATE:-True}
      USE_CELERY: ${WGER_USE_CELERY:-True}
      CELERY_BROKER: ${WGER_CELERY_BROKER:-redis://redis:6379/2}
      CELERY_BACKEND: ${WGER_CELERY_BACKEND:-redis://redis:6379/2}
      CELERY_FLOWER_PASSWORD: ${WGER_CELERY_FLOWER_PASSWORD:-flowerpass}
      DJANGO_DB_ENGINE: ${WGER_DJANGO_DB_ENGINE:-django.db.backends.postgresql}
      DJANGO_DB_DATABASE: ${WGER_DJANGO_DB_DATABASE:-wger}
      DJANGO_DB_USER: ${WGER_DJANGO_DB_USER:-postgres}
      DJANGO_DB_PASSWORD: ${WGER_DJANGO_DB_PASSWORD:-${POSTGRES_PASSWORD}}
      DJANGO_DB_HOST: ${WGER_DJANGO_DB_HOST:-postgres}
      DJANGO_DB_PORT: ${WGER_DJANGO_DB_PORT:-5432}
      DJANGO_PERFORM_MIGRATIONS: ${WGER_DJANGO_PERFORM_MIGRATIONS:-True}
      DJANGO_CACHE_BACKEND: ${WGER_DJANGO_CACHE_BACKEND:-django_redis.cache.RedisCache}
      DJANGO_CACHE_LOCATION: ${WGER_DJANGO_CACHE_LOCATION:-redis://redis:6379/1}
      DJANGO_CACHE_CLIENT_CLASS: ${WGER_DJANGO_CACHE_CLIENT_CLASS:-django_redis.client.DefaultClient}
      DJANGO_CACHE_TIMEOUT: ${WGER_DJANGO_CACHE_TIMEOUT:-12960}

    volumes:
      - wger_media:/home/wger/media

    depends_on:
      wger-web:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "celery", "-A", "wger", "inspect", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    deploy:
      resources:
        limits:
          memory: 256M

    networks:
      - internal

  wger-celery-beat:
    image: wger/server:2.5
    command: /start-beat
    restart: unless-stopped

    environment:
      SECRET_KEY: ${WGER_SECRET_KEY:-changeme-secret-key-change-me}
      SIGNING_KEY: ${WGER_SIGNING_KEY:-changeme-signing-key-change-me}
      TIME_ZONE: ${WGER_TIME_ZONE:-Europe/Moscow}
      TZ: ${WGER_TZ:-Europe/Moscow}
      WGER_INSTANCE: ${WGER_INSTANCE:-https://wger.de}
      ALLOW_REGISTRATION: ${WGER_ALLOW_REGISTRATION:-True}
      ALLOW_GUEST_USERS: ${WGER_ALLOW_GUEST_USERS:-False}
      ALLOW_UPLOAD_VIDEOS: ${WGER_ALLOW_UPLOAD_VIDEOS:-True}
      MIN_ACCOUNT_AGE_TO_TRUST: ${WGER_MIN_ACCOUNT_AGE_TO_TRUST:-21}
      SYNC_EXERCISES_CELERY: ${WGER_SYNC_EXERCISES_CELERY:-True}
      SYNC_EXERCISE_IMAGES_CELERY: ${WGER_SYNC_EXERCISE_IMAGES_CELERY:-True}
      SYNC_EXERCISE_VIDEOS_CELERY: ${WGER_SYNC_EXERCISE_VIDEOS_CELERY:-True}
      SYNC_INGREDIENTS_CELERY: ${WGER_SYNC_INGREDIENTS_CELERY:-True}
      SYNC_INGREDIENTS_DUMP_URL: ${WGER_SYNC_INGREDIENTS_DUMP_URL:-https://wger.de/media/ingredients/ingredients.jsonl.gz}
      DOWNLOAD_INGREDIENTS_FROM: ${WGER_DOWNLOAD_INGREDIENTS_FROM:-WGER}
      CACHE_API_EXERCISES_CELERY: ${WGER_CACHE_API_EXERCISES_CELERY:-True}
      CACHE_API_EXERCISES_CELERY_FORCE_UPDATE: ${WGER_CACHE_API_EXERCISES_CELERY_FORCE_UPDATE:-True}
      USE_CELERY: ${WGER_USE_CELERY:-True}
      CELERY_BROKER: ${WGER_CELERY_BROKER:-redis://redis:6379/2}
      CELERY_BACKEND: ${WGER_CELERY_BACKEND:-redis://redis:6379/2}
      CELERY_FLOWER_PASSWORD: ${WGER_CELERY_FLOWER_PASSWORD:-flowerpass}
      DJANGO_DB_ENGINE: ${WGER_DJANGO_DB_ENGINE:-django.db.backends.postgresql}
      DJANGO_DB_DATABASE: ${WGER_DJANGO_DB_DATABASE:-wger}
      DJANGO_DB_USER: ${WGER_DJANGO_DB_USER:-postgres}
      DJANGO_DB_PASSWORD: ${WGER_DJANGO_DB_PASSWORD:-${POSTGRES_PASSWORD}}
      DJANGO_DB_HOST: ${WGER_DJANGO_DB_HOST:-postgres}
      DJANGO_DB_PORT: ${WGER_DJANGO_DB_PORT:-5432}
      DJANGO_PERFORM_MIGRATIONS: ${WGER_DJANGO_PERFORM_MIGRATIONS:-True}
      DJANGO_CACHE_BACKEND: ${WGER_DJANGO_CACHE_BACKEND:-django_redis.cache.RedisCache}
      DJANGO_CACHE_LOCATION: ${WGER_DJANGO_CACHE_LOCATION:-redis://redis:6379/1}
      DJANGO_CACHE_CLIENT_CLASS: ${WGER_DJANGO_CACHE_CLIENT_CLASS:-django_redis.client.DefaultClient}
      DJANGO_CACHE_TIMEOUT: ${WGER_DJANGO_CACHE_TIMEOUT:-12960}

    volumes:
      - wger_celery_beat:/home/wger/beat/

    depends_on:
      wger-celery-worker:
        condition: service_healthy

    deploy:
      resources:
        limits:
          memory: 128M

    networks:
      - internal

  # ── Linkding (Bookmarks) ────────────────────────────────────────────────
  linkding:
    image: sissbruecker/linkding:1.45.0-alpine
    restart: unless-stopped

    environment:
      LD_CSRF_TRUSTED_ORIGINS: ${LD_CSRF_TRUSTED_ORIGINS:-http://bookmarks.priney.com}

    volumes:
      - linkding_data:/etc/linkding/data

    # For local testing — set LINKDING_PORT=9090 in .env
    ports:
      - ${LINKDING_PORT:-}:9090

    deploy:
      resources:
        limits:
          memory: 128M

    networks:
      - internal
      - dokploy-network

    labels:
      - traefik.enable=true
      - traefik.http.routers.linkding-web.rule=Host(`bookmarks.priney.com`)
      - traefik.http.routers.linkding-web.entrypoints=web
      - traefik.http.services.linkding-web.loadbalancer.server.port=9090
      - traefik.docker.network=dokploy-network

  # ── BeaverHabits (Habits) ──────────────────────────────────────────────
  beaverhabits:
    image: daya0576/beaverhabits:0.9.1
    restart: unless-stopped

    environment:
      HABITS_STORAGE: DATABASE
      HABITS_USER_EMAIL: ${BEAVERHABITS_EMAIL:-}

    # Bind mount — Docker named volumes have root ownership, container runs as nobody
    volumes:
      - ./data/beaverhabits:/app/.user/

    # For local testing — set BEAVERHABITS_PORT=8081 in .env
    ports:
      - ${BEAVERHABITS_PORT:-}:8080

    deploy:
      resources:
        limits:
          memory: 64M

    networks:
      - internal
      - dokploy-network

    labels:
      - traefik.enable=true
      - traefik.http.routers.beaverhabits-web.rule=Host(`habits.priney.com`)
      - traefik.http.routers.beaverhabits-web.entrypoints=web
      - traefik.http.services.beaverhabits-web.loadbalancer.server.port=8080
      - traefik.docker.network=dokploy-network

  # ── OpenTickly (Time Tracker) ──────────────────────────────────────────
  opentickly:
    image: correctroad/opentoggl:latest
    restart: unless-stopped

    environment:
      OPENTOGGL_SERVICE_NAME: opentickly
      PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/opentickly?sslmode=disable
      REDIS_URL: redis://redis:6379/3
      OPENTOGGL_FILESTORE_NAMESPACE: opentickly
      OPENTOGGL_JOBS_QUEUE_NAME: default

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/readyz"]
      interval: 5s
      timeout: 3s
      retries: 20

    ports:
      - ${OPENTICKLY_PORT:-}:8080

    deploy:
      resources:
        limits:
          memory: 256M

    networks:
      - internal
      - dokploy-network

    labels:
      - traefik.enable=true
      - traefik.http.routers.opentickly-web.rule=Host(`time.priney.com`)
      - traefik.http.routers.opentickly-web.entrypoints=web
      - traefik.http.services.opentickly-web.loadbalancer.server.port=8080
      - traefik.docker.network=dokploy-network

volumes:
  postgres_data:
  redis_data:
  vikunja_files:
  firefly_uploads:
  wger_static:
  wger_media:
  wger_celery_beat:
  linkding_data:

# Shared networks.
# dokploy-network is created by Dokploy; internal is for db/cache/backend traffic.
networks:
  dokploy-network:
    external: true
  internal:
    name: ${COMPOSE_PROJECT_NAME:-pd}-internal
    internal: true
